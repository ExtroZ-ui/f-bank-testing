name: Python Selenium UI tests

on:
  push:
  pull_request:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome and ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true

      - name: Export browser paths
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> $GITHUB_ENV
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
          "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r autotests/requirements.txt

      - name: Start application
        run: |
          nohup python -m http.server 8000 --bind 127.0.0.1 > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:8000/?balance=30000&reserved=20001" > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Application did not start"
          cat server.log || true
          exit 1

      - name: Run Python Selenium tests
        env:
          BASE_URL: http://127.0.0.1:8000/?balance=30000&reserved=20001
          CHROME_BIN: ${{ env.CHROME_BIN }}
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
        run: |
          python -m pytest -v autotests/tests