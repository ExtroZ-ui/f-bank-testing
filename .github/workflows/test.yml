name: UI tests

on:
  push:
  pull_request:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chromium and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-driver chromium-browser || sudo apt-get install -y chromium-driver chromium
          which chromium-browser || true
          which chromium || true
          which chromedriver || true

      - name: Install autotest dependencies
        working-directory: autotests
        run: npm install

      - name: Start application
        run: |
          python3 -m http.server 8000 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for application
        run: |
          for i in {1..20}; do
            if curl -s http://127.0.0.1:8000/?balance=30000&reserved=20001 > /dev/null; then
              echo "Application is up"
              exit 0
            fi
            sleep 1
          done
          echo "Application did not start"
          exit 1

      - name: Run Selenium tests
        working-directory: autotests
        env:
          CHROME_BIN: /usr/bin/chromium
        run: npm test