name: UI tests

on:
  push:
  pull_request:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome and matching ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true

      - name: Export browser paths
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> $GITHUB_ENV
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          echo "ChromeDriver path: ${{ steps.setup-chrome.outputs.chromedriver-path }}"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
          "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version

      - name: Install autotest dependencies
        working-directory: autotests
        run: npm install

      - name: Start app and run Selenium tests
        working-directory: autotests
        env:
          CHROME_BIN: ${{ env.CHROME_BIN }}
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
        run: |
          cd ..
          python3 -m http.server 8000 > server.log 2>&1 &
          SERVER_PID=$!
          echo "Started server with PID $SERVER_PID"

          for i in {1..20}; do
            if curl -s http://127.0.0.1:8000/?balance=30000&reserved=20001 > /dev/null; then
              echo "Application is up"
              break
            fi
            sleep 1
          done

          cd autotests
          npm test